<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prank</title>
    <style> 
        body {
            text-align: center;
            margin-top: 200px;
            font-family: Arial;
            background-color: #f5f5f5;
        }
        h1{
            font-size: 50px;
        }
        img{
            display: block;
            margin: auto;
        }
        p{
            font-size: 25px;
        }
        button{
            padding: 12px 25px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: rgb(8, 8, 8);
            color: rgb(171, 168, 168);
            cursor: pointer;
        }
        button : hover{
            background : purple ;
        }
    </style>
    
</head>
<body>
    <img src="scary.jpg" id="pic" width="300" style="display:none;">
    <h1> Heyyy Welcome </h1>
    <p> Gift for you </p>
    <button>Enter</button>
    <script>
        let btn = 
        document.querySelector("button");
        btn.addEventListener("click",function(){
            document.querySelector("h1").innerText = "HEHEHE Prank";
            document.querySelector("p").innerText = "This is you";
            document.body.style.backgroundColor = "black";
            document.querySelector("h1").style.color="white";
            document.querySelector("p").style.color="white";
            document.querySelector("#pic").style.display = "block";
        } );
        </script>
</body>
</html>
